<body>

                <div class="w-12 h-12 bg-mestra-blue rounded flex items-center justify-center text-white"><i data-lucide="mountain" size="28"></i></div>
                <div class="flex flex-col leading-none">

            </div>

    <section class="h-screen relative flex items-center justify-center text-center text-white hero-section">
        <div class="max-w-4xl px-6 pt-20">
            <span class="text-mestra-gold text-xs font-bold uppercase tracking-[0.5em] mb-6 block">Marmoraria de Luxo</span>
            <h1 class="text-5xl md:text-8xl mb-8 leading-[1.1] font-serif">Transformando o ordinário em <span class="italic text-mestra-gold">extraordinário</span>.</h1>
            <p class="text-lg md:text-2xl text-gray-200 mb-12 max-w-2xl mx-auto font-light leading-relaxed">Consultoria técnica especializada em rochas ornamentais para projectos de alto padrão.</p>
            <div class="flex flex-col sm:flex-row gap-6 justify-center">

    <!-- Formulário Principal -->
    <section id="cadastro" class="py-32 bg-gray-50">
        <div class="max-w-4xl mx-auto px-6">
            <div class="bg-white rounded-[40px] shadow-2xl p-8 md:p-16 scroll-reveal">
                <h2 class="text-3xl font-serif text-mestra-blue mb-10 text-center uppercase tracking-tight">Diagnóstico Advisors</h2>
                <form id="master-form" class="space-y-10">
                    <div class="grid md:grid-cols-2 gap-10">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-mestra-gold uppercase">Momento da Obra</label>
                            <select id="user-profile" required>
                                <option value="">Selecione...</option>
                                <option value="obra">Obra em andamento</option>
                                <option value="parceiro">Sou Arquiteto/Parceiro</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-mestra-gold uppercase">Nome Completo</label>
                            <input type="text" id="full-name" required placeholder="Seu nome">
                        </div>
                    </div>
                    <div class="grid md:grid-cols-2 gap-10 border-t border-gray-100 pt-10">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-mestra-gold uppercase">WhatsApp</label>
                            <input type="tel" id="whatsapp-num" required placeholder="(00) 00000-0000">
                        </div>
                        <div class="flex items-end">
                            <button type="submit" id="submit-btn" class="w-full bg-mestra-blue text-white py-6 rounded-2xl font-bold uppercase tracking-widest text-[10px] hover:bg-mestra-gold transition-all shadow-xl">Enviar Consultoria</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <a id="whatsapp-floating" href="https://wa.me/5511987585676?text=Olá! Vim do site." target="_blank" class="fixed bottom-8 right-8 w-16 h-16 bg-[#25D366] text-white rounded-full flex items-center justify-center shadow-2xl hover:scale-110 transition-transform z-50"><i data-lucide="message-circle" size="32"></i></a>

    <script>
        lucide.createIcons();
        const observer = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); }); }, { threshold: 0.1 });
        document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));

        // Tente usar uma URL HTTPS ou use o truque do redirecionamento
        const N8N_WEBHOOK_URL = "http://187.77.230.12:5678/webhook-test/e77bf861-5c7a-49a5-805f-fade4a3e7d59"; 
        const WP_LINK = "https://wa.me/5511987585676?text=Ol%C3%A1%20vim%20do%20site%20e%20gostaria%20de%20mais%20informa%C3%A7%C3%B5es";

        async function enviarParaN8n(dados) {
            const btn = document.getElementById('submit-btn');
            try {
                // O modo 'no-cors' pode ajudar a enviar mas você não verá a resposta
                await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
            } catch (err) {
                console.warn("N8N Offline ou Bloqueado, seguindo para WhatsApp...");
            }
            // Garante que o cliente SEMPRE vá para o WhatsApp
            window.location.href = WP_LINK;
        }

        document.getElementById('master-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('submit-btn').classList.add('btn-loading');
            await enviarParaN8n({
                source: "Site_Mestra",
                nome: document.getElementById('full-name').value,
                whatsapp: document.getElementById('whatsapp-num').value,
                perfil: document.getElementById('user-profile').value,
                timestamp: new Date().toISOString()
            });
        });
    </script>
