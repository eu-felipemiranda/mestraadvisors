    <meta charset="UTF-8">

    <title>Mestra Advisors | Marmoraria de Alto Padrão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { --mestra-blue: #0a1d37; --mestra-gold: #c5a059; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #1a1a1a; margin: 0; }
        h1, h2, h3, .font-serif { font-family: 'Playfair Display', serif; }

        .bg-mestra-blue { background-color: var(--mestra-blue); }
        .text-mestra-gold { color: var(--mestra-gold); }
        .bg-mestra-gold { background-color: var(--mestra-gold); }
        .hero-section { background: linear-gradient(rgba(10, 29, 55, 0.7), rgba(10, 29, 55, 0.7)), url('https://images.unsplash.com/photo-1600585154526-990dced4db0d?auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
        .scroll-reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s ease-out; }
        .scroll-reveal.active { opacity: 1; transform: translateY(0); }
        input, select { border-bottom: 1px solid #e2e8f0 !important; border-radius: 0 !important; padding: 12px 0 !important; background: transparent !important; width: 100%; outline: none; }
        input:focus { border-color: var(--mestra-gold) !important; }
        .btn-loading { pointer-events: none; opacity: 0.7; }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TW3PCBC6" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <nav class="fixed w-full z-50 bg-white shadow-sm h-20 flex items-center px-6">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="mountain" class="text-mestra-blue"></i>
                <span class="font-bold text-xl uppercase text-mestra-blue tracking-tighter">Mestra Advisors</span>
            </div>
            <a href="#cadastro" class="bg-mestra-blue text-white px-5 py-2 rounded-full text-xs font-bold uppercase tracking-widest">Consultoria</a>
        </div>
    </nav>

    <section class="hero-section">
        <div class="px-6 max-w-4xl">
            <h1 class="text-5xl md:text-7xl mb-6">Transformando o ordinário em <span class="italic text-mestra-gold">extraordinário</span>.</h1>
            <p class="text-xl mb-10 text-gray-200">Consultoria técnica em rochas para projectos de alto padrão.</p>
            <a href="#cadastro" class="bg-mestra-gold text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest shadow-xl">Iniciar Diagnóstico</a>
        </div>
    </section>

    <section id="cadastro" class="py-24 bg-gray-50">
        <div class="max-w-4xl mx-auto px-6">
            <div class="bg-white rounded-[40px] shadow-2xl p-10 md:p-16">
                <h2 class="text-3xl text-mestra-blue mb-10 text-center font-serif">DIAGNÓSTICO ADVISORS</h2>
                <form id="master-form" class="space-y-8">
                    <div class="grid md:grid-cols-2 gap-8">
                        <div>
                            <label class="text-[10px] font-bold text-mestra-gold uppercase">Momento da Obra</label>
                            <select id="user-profile" required>
                                <option value="">Selecione...</option>
                                <option value="obra">Obra em andamento</option>
                                <option value="parceiro">Sou Parceiro/Arquiteto</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-mestra-gold uppercase">Nome Completo</label>
                            <input type="text" id="full-name" required placeholder="Seu nome">
                        </div>
                    </div>
                    <div class="grid md:grid-cols-2 gap-8">
                        <div>
                            <label class="text-[10px] font-bold text-mestra-gold uppercase">WhatsApp</label>
                            <input type="tel" id="whatsapp-num" required placeholder="(00) 00000-0000">
                        </div>
                        <div class="flex items-end">
                            <button type="submit" id="submit-btn" class="w-full bg-mestra-blue text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-[10px] shadow-lg">Enviar Dados</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center border-t">
        <p class="text-gray-400 text-xs uppercase">© 2024 Mestra Advisors | Marmoraria Premium</p>
    </footer>

    <script>
        // Iniciar Ícones
        lucide.createIcons();

        // Configuração
        const N8N_URL = "http://187.77.230.12:5678/webhook-test/e77bf861-5c7a-49a5-805f-fade4a3e7d59";
        const WA_URL = "https://wa.me/5511987585676?text=Ol%C3%A1%20vim%20do%20site%20e%20gostaria%20de%20mais%20informa%C3%A7%C3%B5es";

        // Submissão
        document.getElementById('master-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.classList.add('btn-loading');
            btn.innerText = "ENVIANDO...";

            const payload = {
                nome: document.getElementById('full-name').value,
                whatsapp: document.getElementById('whatsapp-num').value,
                perfil: document.getElementById('user-profile').value,
                timestamp: new Date().toISOString()
            };

            try {
                // O timeout de 2 segundos evita que o site trave se o n8n não responder
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);

                await fetch(N8N_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Tenta ignorar o bloqueio HTTPS/HTTP
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
            } catch (err) {
                console.log("Erro de conexão ou segurança, redirecionando para WA...");
            }

            // Redireciona sempre
            window.location.href = WA_URL;
        });
    </script>
</body>
</html>
